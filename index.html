  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beoordeel ons – Autobedrijf Van der Heide</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Manrope", sans-serif; background: #004a5d; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .card { background: #ffffff; border-radius: 22px; border: 1px solid #e6e4df; padding: 2.5rem 2.5rem 2rem; width: 100%; max-width: 460px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10); }
    .logo-wrap { margin: 0 auto 1.75rem; width: 60%; max-width: 240px; min-width: 160px; }
    .logo-wrap img { width: 100%; height: auto; display: block; }
    .divider { height: 1px; background: #eeece8; margin: 0 0 1.75rem; }
    .divider-sm { height: 1px; background: #eeece8; margin: 0 0 1.5rem; }
    h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 700; color: #1a1917; margin: 0 0 0.75rem; }
    .subtitle { font-size: clamp(13px, 3.5vw, 15px); font-weight: 400; color: #6b6a67; line-height: 1.65; margin: 0 0 1.75rem; }
    .btn { display: flex; align-items: center; gap: 14px; width: 100%; padding: clamp(0.85rem, 3vw, 1.1rem) 1.1rem; border-radius: 13px; border: 1px solid #d4560f; background: #004a5d; cursor: pointer; text-align: left; text-decoration: none; transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .btn:hover { border-color: #c04d0a; background: #e07d1a; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.99); }
    .btn-icon { width: clamp(38px, 10vw, 46px); height: clamp(38px, 10vw, 46px); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-icon.positive { background: rgba(255,255,255,0.25); }
    .btn-icon.negative { background: rgba(255,255,255,0.25); }
    .btn-text { flex: 1; }
    .btn-label { font-size: clamp(13px, 3.8vw, 15px); font-weight: 600; color: #ffffff; display: block; margin-bottom: 3px; }
    .btn-sub { font-size: clamp(11px, 3vw, 13px); font-weight: 400; color: rgba(255,255,255,0.8); display: block; }
    .btn-arrow { color: rgba(255,255,255,0.7); font-size: 22px; flex-shrink: 0; line-height: 1; }
    .footer { font-size: 11px; font-weight: 500; color: #ffffff; margin-top: 1.5rem; letter-spacing: 0.03em; text-transform: uppercase; opacity: 0.8; }
    @media (min-width: 600px) { .card { padding: 3rem 3rem 2.5rem; } .btn { padding: 1.1rem 1.25rem; gap: 18px; } }
  </style>
